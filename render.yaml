# Render Blueprint — Static Site do Aceite LGPD (Grupo Alcina Maria)
#
# Deploy via Blueprint:  Render -> New -> Blueprint -> conectar este repositorio.
# Deploy manual (sem este arquivo):  New -> Static Site -> Build Command vazio ->
#   Publish Directory ".".  NUNCA escolher "Web Service": o free tier hiberna e o
#   cold start de ~1 min mataria a UX de quem abre o link pelo WhatsApp.
services:
  - name: aceite-lgpd
    type: web
    runtime: static
    staticPublishPath: ./
    # Sem etapa de build: um unico index.html, HTML/CSS/JS puro.
    headers:
      # Content-Security-Policy: só permite os hosts que o app realmente usa
      # (Firebase/Firestore/Auth, Google Fonts, reCAPTCHA do App Check e ipify).
      # frame-ancestors 'none' = ninguem embute a pagina (anti-clickjacking).
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'none'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://apis.google.com; connect-src 'self' https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://api.ipify.org https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://www.google.com https://aceite-lgpd.firebaseapp.com https://accounts.google.com; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
